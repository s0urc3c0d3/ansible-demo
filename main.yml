- name: Create VM with DataVolume (HTTP Source)
  hosts: localhost
  gather_facts: false
  collections:
    - kubevirt.virtualization

  vars:
    vm_name: "auto-vm-01"
    vm_namespace: "default"
    image_url: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"

  tasks:
    - name: Create VM with DataVolume
      kubevirt.virtualization.openshift_virtualization_vm:
        state: present
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
          spec:
            running: false
            template:
              spec:
                domain:
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                  resources:
                    requests:
                      memory: 2Gi
                      cpu: "1"
                volumes:
                  - dataVolume:
                      name: "{{ vm_name }}-dv"
                    name: rootdisk
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-dv"
                spec:
                  source:
                    http:
                      url: "{{ image_url }}"
                  pvc:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 10Gi
