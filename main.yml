- name: Create VM from URL image in OpenShift Virtualization
  hosts: localhost
  gather_facts: false
  collections:
    - redhat.openshift_virtualization

  vars:
    # --- Zmienne konfiguracyjne ---
    vm_name: "test-vm-from-url"
    vm_namespace: "default"  # Upewnij się, że ten projekt istnieje!
    vm_memory: "2Gi"
    vm_cpu: "2"
    # URL do obrazu dysku (np. qcow2, raw). Musi być publicznie dostępny dla klastra.
    image_url: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
    # Rozmiar dysku PVC, który zostanie utworzony
    pvc_size: "15Gi"

  tasks:
    - name: Create VirtualMachine with DataVolume template
      redhat.openshift_virtualization.kubevirt_vm:
        state: present
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
        spec:
          running: false
          template:
            metadata:
              labels:
                kubevirt.io/size: small
            spec:
              domain:
                cpu:
                  cores: "{{ vm_cpu }}"
                memory:
                  guest: "{{ vm_memory }}"
                devices:
                  interfaces:
                    - name: default
                      masquerade: {}
                  disks:
                    - name: rootdisk
                      disk:
                        bus: virtio
              volumes:
                - name: rootdisk
                  dataVolume:
                    name: "{{ vm_name }}-dv"
          # --- Szablon DataVolume jako osobny parametr ---
          data_volume_templates:
            - metadata:
                name: "{{ vm_name }}-dv"
              spec:
                source:
                  http:
                    url: "{{ image_url }}"
                pvc:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: "{{ pvc_size }}"
